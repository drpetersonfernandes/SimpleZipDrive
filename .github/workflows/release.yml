name: Release

on:
  push:
    tags:
      - 'release_*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^release_', ''
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "TAG=$tag" >> $env:GITHUB_OUTPUT
          echo "Version: $version"

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Publish Dokan win-x64
        run: dotnet publish SimpleZipDrive/SimpleZipDrive.csproj -c Release -r win-x64 --self-contained -o publish/dokan-x64

      - name: Publish Dokan win-arm64
        run: dotnet publish SimpleZipDrive/SimpleZipDrive.csproj -c Release -r win-arm64 --self-contained -o publish/dokan-arm64

      - name: Publish WinFsp win-x64
        run: dotnet publish SimpleZipDrive_WinFsp/SimpleZipDrive_WinFsp.csproj -c Release -r win-x64 --self-contained -o publish/winfsp-x64

      - name: Publish WinFsp win-arm64
        run: dotnet publish SimpleZipDrive_WinFsp/SimpleZipDrive_WinFsp.csproj -c Release -r win-arm64 --self-contained -o publish/winfsp-arm64

      - name: Create release zips
        shell: pwsh
        run: |
          $v = "${{ steps.version.outputs.VERSION }}"
          $zipDir = "release-assets"
          New-Item -ItemType Directory -Path $zipDir -Force | Out-Null

          $variants = @(
            @{ Name = "Dokan_win-x64";   Dir = "publish/dokan-x64" },
            @{ Name = "Dokan_win-arm64"; Dir = "publish/dokan-arm64" },
            @{ Name = "WinFsp_win-x64";  Dir = "publish/winfsp-x64" },
            @{ Name = "WinFsp_win-arm64";Dir = "publish/winfsp-arm64" }
          )

          foreach ($variant in $variants) {
            $files = Get-ChildItem -Path $variant.Dir -File | Select-Object -ExpandProperty FullName
            $zipPath = "$zipDir/release_${v}_$($variant.Name).zip"
            Compress-Archive -Path $files -DestinationPath $zipPath -Force
            Write-Output "Created $zipPath with $($files.Count) files"
          }

      - name: Compute SHA256 checksums
        shell: pwsh
        run: |
          $checksums = @()
          $checksums += "## Assets"
          $checksums += ""
          Get-ChildItem -Path "release-assets" -Filter "*.zip" | Sort-Object Name | ForEach-Object {
            $hash = (Get-FileHash -Path $_.FullName -Algorithm SHA256).Hash.ToLower()
            $size = [math]::Round($_.Length / 1MB, 2)
            $checksums += "### $($_.Name)"
            $checksums += "- Size: $size MB"
            $checksums += "- SHA256: ``$hash``"
            $checksums += ""
          }
          $checksums -join "`n" | Out-File -FilePath "release-assets/checksums.md" -Encoding utf8
          Write-Output "Checksums generated:"
          Get-Content "release-assets/checksums.md"

      - name: Generate release notes
        shell: pwsh
        run: |
          $previousTag = git tag --sort=-creatordate | Where-Object { $_ -match '^release_' } | Select-Object -Skip 1 -First 1
          $currentTag = "${{ github.ref_name }}"

          $notes = @()
          $notes += "## What's Changed"
          $notes += ""

          if ($previousTag) {
            $commits = git log "$previousTag..$currentTag" --pretty=format:"- %s (%h)" --no-merges
            $notes += $commits
          } else {
            $commits = git log "$currentTag" --pretty=format:"- %s (%h)" --no-merges
            $notes += $commits
          }

          $notes += ""
          $notes += ""
          $checksumsContent = Get-Content "release-assets/checksums.md" -Raw
          $notes += $checksumsContent

          $notes -join "`n" | Out-File -FilePath "release-assets/release-notes.md" -Encoding utf8
          Write-Output "Release notes:"
          Get-Content "release-assets/release-notes.md"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = "${{ steps.version.outputs.TAG }}"
          $notes = Get-Content "release-assets/release-notes.md" -Raw

          gh release create $tag `
            --title $tag `
            --notes $notes `
            "release-assets/release_${{ steps.version.outputs.VERSION }}_Dokan_win-x64.zip" `
            "release-assets/release_${{ steps.version.outputs.VERSION }}_Dokan_win-arm64.zip" `
            "release-assets/release_${{ steps.version.outputs.VERSION }}_WinFsp_win-x64.zip" `
            "release-assets/release_${{ steps.version.outputs.VERSION }}_WinFsp_win-arm64.zip"
